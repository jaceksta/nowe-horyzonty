<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nowe Horyzonty 2026 — Program Filmowy</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #eeeeee;
      --surface:    #ffffff;
      --surface-h:  #f5f5f5;
      --seam:       #cccccc;
      --text-1:     #121212;
      --text-2:     #555555;
      --text-3:     #999999;
      --accent:     #EC008C;
      --green:      rgba(25,135,84,.09);
      --green-text: #1a7a40;
      --red:        #c82333;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Roboto', Arial, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── header ── */
    header {
      background: var(--surface);
      padding: 52px 48px 40px;
      border-bottom: 2px solid var(--text-1);
      position: relative;
      overflow: hidden;
    }

    .ghost {
      position: absolute; right: -16px; bottom: -50px;
      font-family: 'Roboto', sans-serif;
      font-size: 260px; font-weight: 700; line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px #e2e2e2;
      pointer-events: none; user-select: none;
    }

    .eyebrow {
      font-size: 10px; letter-spacing: .3em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px; font-weight: 400;
    }

    h1 {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(38px, 5vw, 72px);
      font-weight: 400; line-height: 1.05;
      letter-spacing: -.02em;
    }

    h1 em { font-style: normal; color: var(--accent); }

    .sub {
      margin-top: 10px; font-size: 11.5px;
      color: var(--text-3); letter-spacing: .12em;
      text-transform: uppercase;
    }

    .rule {
      width: 40px; height: 2px;
      background: var(--text-1);
      margin: 24px 0;
    }

    .stats { display: flex; gap: 40px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-n {
      font-size: 34px; font-weight: 500;
      color: var(--accent); line-height: 1;
    }
    .stat-l {
      font-size: 9.5px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--text-3);
    }

    /* ── view tabs ── */
    .view-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--seam);
      padding: 0 48px;
      display: flex;
    }

    .vtab {
      padding: 14px 20px;
      font-size: 11px; letter-spacing: .13em;
      text-transform: uppercase; font-weight: 400;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
      display: flex; align-items: center; gap: 7px;
    }

    .vtab:hover { color: var(--text-1); }

    .vtab.vtab-on {
      color: var(--text-1);
      border-bottom-color: var(--text-1);
      font-weight: 500;
    }

    .plan-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 2em;
      font-size: 10px; font-weight: 500;
      padding: 1px 7px;
      display: none;
    }

    .plan-badge.visible { display: inline; }

    /* ── controls ── */
    .controls {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--seam);
      padding: 12px 48px;
      display: flex; flex-direction: column; gap: 9px;
    }

    .search-row { display: flex; align-items: center; gap: 10px; }

    .search-wrap { position: relative; flex: 1; max-width: 440px; }

    .search-wrap svg {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 13px; height: 13px; color: var(--text-3);
    }

    #search {
      width: 100%;
      background: #fff;
      border: 1px solid var(--seam);
      color: var(--text-1);
      padding: 8px 12px 8px 34px;
      font-family: 'Roboto', sans-serif;
      font-size: 13px; font-weight: 300;
      border-radius: 2em; outline: none;
      transition: border-color .15s;
    }
    #search::placeholder { color: var(--text-3); }
    #search:focus { border-color: var(--accent); }

    .count {
      font-size: 11.5px; color: var(--text-3);
      letter-spacing: .03em; white-space: nowrap;
      min-width: 58px; text-align: right;
    }

    /* filter rows */
    .filter-rows { display: flex; flex-direction: column; gap: 7px; }
    .filter-row { display: flex; align-items: center; gap: 7px; }
    .filter-label {
      font-size: 9px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--text-3);
      flex-shrink: 0; min-width: 40px;
    }

    .chips { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 4px 13px;
      font-size: 11px; font-family: 'Roboto', sans-serif;
      font-weight: 400; letter-spacing: .04em;
      border: 1px solid var(--seam); border-radius: 2em;
      background: #fff; color: var(--text-3);
      cursor: pointer; white-space: nowrap;
      transition: border-color .15s, color .15s, background .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text-2); }

    .chip.on {
      background: var(--text-1); border-color: var(--text-1);
      color: #fff; font-weight: 500;
    }
    .chip.date-on {
      background: var(--text-1); border-color: var(--text-1);
      color: #fff; font-weight: 500;
    }
    .chip.stay-on {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 500;
    }
    .chip.avail-on {
      background: rgba(25,135,84,.12); border-color: rgba(25,135,84,.5);
      color: var(--green-text); font-weight: 500;
    }

    /* ── list ── */
    .grid {
      display: flex; flex-direction: column;
      gap: 1px; background: var(--seam);
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      padding: 16px 30px;
      position: relative; overflow: hidden;
      display: flex; gap: 24px; align-items: flex-start;
      transition: background .15s;
    }

    .card::before {
      content: ''; position: absolute;
      top: 0; left: 0; width: 3px; height: 0;
      background: var(--accent);
      transition: height .25s ease;
    }
    .card:hover { background: var(--surface-h); }
    .card:hover::before { height: 100%; }

    .card-main { flex: 1; min-width: 0; }

    .card-sc {
      flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
      padding-top: 1px; min-width: 148px;
    }

    /* wishlist button */
    .wl-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--seam); border-radius: 50%;
      background: var(--surface); color: var(--text-3);
      cursor: pointer; font-size: 15px;
      transition: all .15s; flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 6px;
    }
    .wl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .wl-btn.on {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    /* badges */
    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }

    .badge {
      font-size: 9px; letter-spacing: .13em;
      text-transform: uppercase;
      padding: 2px 8px; border-radius: 2em;
      border: 1px solid transparent;
    }

    /* title */
    .title {
      font-family: 'Roboto', sans-serif;
      font-size: 19px; font-weight: 500; line-height: 1.2;
      margin-bottom: 2px;
    }
    .title a { color: inherit; text-decoration: none; transition: color .15s; }
    .title a:hover { color: var(--accent); }

    .orig {
      font-size: 12.5px; font-style: italic;
      color: var(--text-3); margin-bottom: 4px;
    }

    .dir {
      font-size: 11.5px; color: var(--text-3);
      margin-bottom: 9px; font-weight: 400;
    }
    .dir::before {
      content: 'reż. ';
      font-size: 9.5px; letter-spacing: .12em;
      text-transform: uppercase;
    }
    .dur {
      font-size: 10.5px; color: var(--text-3);
      margin-left: 6px; opacity: .7;
    }

    /* screening tags */
    .stag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; font-size: 10.5px;
      border: 1px solid var(--seam); border-radius: 2px;
      background: #fff;
    }
    .stag.ok {
      border-color: rgba(25,135,84,.35);
      background: var(--green);
    }

    .sdot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-3); flex-shrink: 0;
    }
    .stag.ok .sdot { background: var(--green-text); }

    .stime { color: var(--text-2); }
    .stag.ok .stime { color: var(--green-text); }

    .svenue {
      font-size: 9px; color: var(--text-3);
      padding-left: 5px; border-left: 1px solid var(--seam);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .stag.ok .svenue { color: var(--green-text); opacity: .7; border-color: rgba(25,135,84,.3); }

    /* description */
    .desc { font-size: 12.5px; line-height: 1.75; color: var(--text-2); }

    .desc-body {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }
    .desc-body.open { display: block; }

    .more {
      display: none;
      margin-top: 6px;
      font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--accent);
      cursor: pointer; background: none; border: none;
      padding: 0; font-family: inherit;
      transition: opacity .15s;
    }
    .more:hover { opacity: .6; }

    /* prizes */
    .prizes { margin-top: 10px; }

    .prize-count {
      display: inline-block;
      font-size: 9.5px; letter-spacing: .14em;
      text-transform: uppercase; font-weight: 500;
      color: var(--accent); margin-bottom: 4px;
    }

    .prize-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 2px;
    }

    .prize-list li {
      font-size: 11.5px; color: var(--text-3);
      padding-left: 10px; position: relative;
    }

    .prize-list li::before {
      content: '—';
      position: absolute; left: 0;
      color: var(--accent); font-size: 10px;
    }

    /* empty */
    .msg {
      padding: 100px 40px; text-align: center;
      color: var(--text-3); font-size: 20px; font-weight: 300;
      background: var(--surface);
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: up .28s ease both; }

    /* ── plan view ── */
    #plan-view { min-height: 50vh; }

    .plan-empty {
      display: flex; align-items: center; justify-content: center;
      min-height: 40vh; padding: 40px;
      color: var(--text-3); font-size: 18px; font-weight: 300;
      text-align: center;
    }

    .plan-top {
      padding: 28px 48px 20px;
      border-bottom: 1px solid var(--seam);
      background: var(--surface);
      display: flex; align-items: flex-start;
      gap: 32px; flex-wrap: wrap;
    }

    .plan-stats { display: flex; gap: 32px; flex-wrap: wrap; }

    .pstat { display: flex; flex-direction: column; gap: 2px; }

    .pstat-n {
      font-size: 28px; font-weight: 500;
      color: var(--accent); line-height: 1;
    }

    .pstat-n.red { color: var(--red); }
    .pstat-n.grey { color: var(--text-3); }

    .pstat-l {
      font-size: 9px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text-3);
    }

    .plan-note {
      font-size: 10.5px; color: var(--text-3);
      letter-spacing: .04em; align-self: flex-end;
    }

    /* ── timeline ── */
    .tl-wrap {
      overflow-x: auto;
      padding: 20px 48px 48px;
    }

    .tl-flex {
      display: flex;
      min-width: 520px;
    }

    .tl-axis-col {
      flex-shrink: 0;
      width: 44px;
      padding-top: 36px;
    }

    .tl-axis-inner {
      position: relative;
    }

    .tl-hour-label {
      position: absolute; left: 0; right: 4px;
      font-size: 9.5px; color: var(--text-3);
      letter-spacing: .04em; text-align: right;
      transform: translateY(-50%);
      pointer-events: none; user-select: none;
    }

    .tl-day-col {
      flex: 1;
      min-width: 120px;
      display: flex; flex-direction: column;
      border-left: 1px solid var(--seam);
    }

    .tl-day-hdr {
      height: 36px;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; flex-shrink: 0;
      border-bottom: 1px solid var(--seam);
      background: var(--surface);
    }

    .tl-day-dn {
      font-size: 11px; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase;
    }

    .tl-day-dt {
      font-size: 10px; color: var(--text-3);
    }

    .tl-day-body {
      position: relative;
      background: var(--surface);
    }

    .tl-grid-line {
      position: absolute; left: 0; right: 0;
      height: 1px; background: var(--seam);
      pointer-events: none;
    }

    .film-block {
      position: absolute;
      border-radius: 3px;
      padding: 5px 7px;
      overflow: hidden;
      cursor: default;
      background: var(--accent);
      transition: opacity .15s;
    }

    .film-block:hover { opacity: .9; z-index: 10; }
    .film-block:hover .fb-remove { opacity: 1; }

    .film-block.conflict { background: var(--red); }

    .fb-remove {
      position: absolute; top: 3px; right: 3px;
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.25); border: none; border-radius: 50%;
      color: #fff; font-size: 11px; line-height: 1;
      cursor: pointer; padding: 0;
      opacity: 0; transition: opacity .1s, background .1s;
    }
    .fb-remove:hover { background: rgba(0,0,0,.5); }

    .fb-time {
      font-size: 8.5px; color: rgba(255,255,255,.75);
      letter-spacing: .04em; white-space: nowrap;
    }

    .fb-title {
      font-size: 11px; font-weight: 500; color: #fff;
      line-height: 1.25; margin-top: 3px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
    }

    .fb-venue {
      font-size: 8.5px; color: rgba(255,255,255,.65);
      letter-spacing: .08em; text-transform: uppercase;
      margin-top: 3px; white-space: nowrap;
    }

    /* ── plan issues (films with no visible screenings) ── */
    .plan-issues {
      padding: 0 48px 24px;
    }

    .plan-section-hdr {
      font-size: 10px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text-3);
      font-weight: 400; margin-bottom: 8px; margin-top: 24px;
    }

    .plan-section-hdr:first-child { margin-top: 0; }

    .plan-issue {
      display: flex; flex-direction: column; gap: 2px;
      padding: 10px 0;
      border-bottom: 1px solid var(--seam);
      font-size: 13px;
    }

    .issue-sub {
      font-size: 11px; color: var(--text-3);
    }

    /* ── plan list ── */
    .plan-list {
      margin: 0 48px 48px;
      border: 1px solid var(--seam);
      border-radius: 4px;
      background: var(--surface);
      overflow: hidden;
    }

    .plan-list-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--seam);
      background: var(--surface-h);
    }

    .plan-list-title {
      font-size: 10px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text-3); font-weight: 400;
    }

    .copy-btn {
      padding: 5px 14px;
      font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; font-weight: 500;
      font-family: 'Roboto', sans-serif;
      border: 1px solid var(--seam); border-radius: 2em;
      background: #fff; color: var(--text-2);
      cursor: pointer; transition: all .15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { background: var(--accent); border-color: var(--accent); color: #fff; }

    .plan-list-text {
      display: block; width: 100%;
      padding: 16px;
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-size: 12px; line-height: 1.8; color: var(--text-1);
      background: var(--surface);
      border: none; outline: none; resize: vertical;
      min-height: 160px;
    }

    /* ── plan tooltip ── */
    .plan-tooltip {
      position: fixed;
      z-index: 1000;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid var(--seam);
      border-radius: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      padding: 12px 14px;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity .1s ease;
    }
    .plan-tooltip.visible { opacity: 1; visibility: visible; }

    .pt-title {
      font-family: 'Roboto', sans-serif;
      font-size: 13.5px; font-weight: 500;
      line-height: 1.3; margin-bottom: 3px;
    }
    .pt-meta {
      font-size: 10.5px; color: var(--text-3);
      margin-bottom: 8px;
    }
    .pt-desc {
      font-size: 12px; line-height: 1.6; color: var(--text-2);
      max-height: 220px; overflow-y: auto;
    }

    /* ── legend ── */
    .tl-legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding: 0 48px 8px;
    }

    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-3); letter-spacing: .05em;
    }

    .legend-dot {
      width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
    }

    /* footer */
    footer {
      background: var(--surface);
      padding: 24px 48px;
      border-top: 2px solid var(--text-1);
      font-size: 10px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text-3);
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }

    /* responsive */
    @media (max-width: 768px) {
      header { padding: 32px 20px 28px; }
      .ghost { font-size: 140px; right: -10px; bottom: -20px; }
      .controls { padding: 10px 20px; }
      .card { padding: 14px 20px; flex-direction: column; gap: 10px; }
      .card-sc { align-items: flex-start; min-width: 0; flex-direction: row; flex-wrap: wrap; }
      footer { padding: 20px 20px; }
      .stats { gap: 22px; }
      .view-tabs { padding: 0 20px; }
      .plan-top { padding: 20px 20px 16px; }
      .tl-wrap { padding: 16px 20px 40px; }
      .plan-issues { padding: 0 20px 16px; }
      .tl-legend { padding: 0 20px 8px; }
      .plan-list { margin: 0 20px 40px; }
    }
    @media (max-width: 460px) {
      h1 { font-size: 34px; }
      .ghost { display: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="ghost" aria-hidden="true">NH</p>
  <p class="eyebrow">26. Międzynarodowy Festiwal Filmowy</p>
  <h1>Nowe <em>Horyzonty</em></h1>
  <p class="sub">Wrocław &nbsp;·&nbsp; 23 lip – 2 sie 2026</p>
  <div class="rule"></div>
  <div class="stats">
    <div class="stat">
      <span class="stat-n" id="s-films">–</span>
      <span class="stat-l">Filmów</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="s-seats">–</span>
      <span class="stat-l">Seansów</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="s-avail">–</span>
      <span class="stat-l">Dostępnych</span>
    </div>
  </div>
</header>

<nav class="view-tabs">
  <button class="vtab vtab-on" id="tab-program" onclick="setTab('program')">Program</button>
  <button class="vtab" id="tab-plan" onclick="setTab('plan')">
    Mój Plan
    <span class="plan-badge" id="plan-badge"></span>
  </button>
</nav>

<div class="controls" id="controls">
  <div class="search-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7.5"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21"/>
      </svg>
      <input type="text" id="search" placeholder="Szukaj tytułu lub reżysera…" autocomplete="off" spellcheck="false">
    </div>
    <button class="chip" id="avail-btn">Tylko dostępne</button>
    <span class="count" id="count"></span>
  </div>
  <div class="filter-rows">
    <div class="filter-row">
      <span class="filter-label">Sekcja</span>
      <div class="chips" id="chips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Dzień</span>
      <button class="chip" id="stay-btn">Mój pobyt 27–30 lip</button>
      <div class="chips" id="date-chips"></div>
    </div>
  </div>
</div>

<main id="main-catalog">
  <div class="grid" id="grid">
    <div class="msg">Ładowanie programu…</div>
  </div>
</main>

<div id="plan-view" hidden></div>

<footer>
  <span>Nowe Horyzonty 2026</span>
  <span>nowehoryzonty.pl</span>
</footer>

<script>
// ── state ──────────────────────────────────────────────────────────────────────
let films = [];
let query = '';
let activeSection = '';
let availOnly = false;
let activeDate = '';
let myStay = true;
let firstRender = true;
let currentTab = 'program';

let wishlist          = new Set(JSON.parse(localStorage.getItem('nh-wishlist')   || '[]'));
let excludedScreenings = new Set(JSON.parse(localStorage.getItem('nh-excluded')  || '[]'));

const MY_DATES = new Set(['pn 27 lip', 'wt 28 lip', 'śr 29 lip', 'cz 30 lip']);

const PLAN_DAYS = [
  { key: 'pn 27 lip', short: 'PN', date: '27 lip' },
  { key: 'wt 28 lip', short: 'WT', date: '28 lip' },
  { key: 'śr 29 lip', short: 'ŚR', date: '29 lip' },
  { key: 'cz 30 lip', short: 'CZ', date: '30 lip' },
];

const FALLBACK_DURATION = 90;
const BUFFER_MIN        = 15;
const PX_PER_MIN   = 1;
const TL_START_H   = 9;
const TL_END_H     = 24;
const TL_RANGE_MIN = (TL_END_H - TL_START_H) * 60; // 900

// ── tab switching ──────────────────────────────────────────────────────────────
function setTab(name) {
  currentTab = name;
  const inProgram = name === 'program';
  document.getElementById('controls').hidden       = !inProgram;
  document.getElementById('main-catalog').hidden   = !inProgram;
  document.getElementById('plan-view').hidden      = inProgram;
  document.getElementById('tab-program').classList.toggle('vtab-on', inProgram);
  document.getElementById('tab-plan').classList.toggle('vtab-on', !inProgram);
  hidePlanTooltip();
  if (!inProgram) renderPlanView();
}

// ── wishlist ───────────────────────────────────────────────────────────────────
function saveWishlist() {
  localStorage.setItem('nh-wishlist', JSON.stringify([...wishlist]));
}

function updatePlanBadge() {
  const badge = document.getElementById('plan-badge');
  badge.textContent = wishlist.size;
  badge.classList.toggle('visible', wishlist.size > 0);
}

document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.wl-btn');
  if (!btn) return;
  e.stopPropagation();
  const slug = btn.dataset.slug;
  if (wishlist.has(slug)) {
    wishlist.delete(slug);
    // Clear any excluded screenings for this film
    const film = films.find(f => f.slug === slug);
    if (film) film.screenings.forEach(s => excludedScreenings.delete(s.screening_id));
    localStorage.setItem('nh-excluded', JSON.stringify([...excludedScreenings]));
  } else {
    wishlist.add(slug);
  }
  saveWishlist();
  const on = wishlist.has(slug);
  btn.classList.toggle('on', on);
  btn.title = on ? 'Usuń z planu' : 'Dodaj do planu';
  btn.textContent = on ? '★' : '☆';
  updatePlanBadge();
});

document.getElementById('plan-view').addEventListener('click', e => {
  const btn = e.target.closest('.fb-remove');
  if (!btn) return;
  e.stopPropagation();
  excludedScreenings.add(btn.dataset.sid);
  localStorage.setItem('nh-excluded', JSON.stringify([...excludedScreenings]));
  hidePlanTooltip();
  renderPlanView();
});

// ── plan timeline tooltip (film description on hover) ───────────────────────────
let planTooltipEl = null;
function ensurePlanTooltip() {
  if (!planTooltipEl) {
    planTooltipEl = document.createElement('div');
    planTooltipEl.className = 'plan-tooltip';
    document.body.appendChild(planTooltipEl);
  }
  return planTooltipEl;
}

function positionPlanTooltip(x, y) {
  const el = planTooltipEl;
  if (!el) return;
  const pad = 16;
  const rect = el.getBoundingClientRect();
  let left = x + pad;
  let top  = y + pad;
  if (left + rect.width > window.innerWidth - 8)  left = x - rect.width - pad;
  if (top + rect.height > window.innerHeight - 8) top  = y - rect.height - pad;
  el.style.left = `${Math.max(8, left)}px`;
  el.style.top  = `${Math.max(8, top)}px`;
}

function showPlanTooltip(film, x, y) {
  const el = ensurePlanTooltip();
  const desc = (film.description || '').replace(/\n+/g, ' ').trim();
  el.innerHTML = `
    <div class="pt-title">${film.title}</div>
    ${film.director ? `<div class="pt-meta">${film.director}${film.duration_minutes ? ` · ${film.duration_minutes}'` : ''}</div>` : ''}
    ${desc ? `<div class="pt-desc">${desc}</div>` : ''}
  `;
  el.classList.add('visible');
  positionPlanTooltip(x, y);
}

function hidePlanTooltip() {
  if (planTooltipEl) planTooltipEl.classList.remove('visible');
}

document.getElementById('plan-view').addEventListener('mouseover', e => {
  const block = e.target.closest('.film-block');
  if (!block || block.contains(e.relatedTarget)) return;
  const film = films.find(f => f.slug === block.dataset.slug);
  if (!film) return;
  showPlanTooltip(film, e.clientX, e.clientY);
});

document.getElementById('plan-view').addEventListener('mousemove', e => {
  if (!planTooltipEl || !planTooltipEl.classList.contains('visible')) return;
  if (!e.target.closest('.film-block')) return;
  positionPlanTooltip(e.clientX, e.clientY);
});

document.getElementById('plan-view').addEventListener('mouseout', e => {
  const block = e.target.closest('.film-block');
  if (!block || block.contains(e.relatedTarget)) return;
  hidePlanTooltip();
});

// ── scheduling algorithm ───────────────────────────────────────────────────────
function minsFromMidnight(dtText) {
  const m = dtText.match(/, (\d+):(\d+)/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}

function filmDuration(film) {
  return film.duration_minutes || FALLBACK_DURATION;
}

function blocksConflict(b1, b2) {
  if (extractDate(b1.screening.datetime_text) !== extractDate(b2.screening.datetime_text)) return false;
  const m1 = minsFromMidnight(b1.screening.datetime_text);
  const m2 = minsFromMidnight(b2.screening.datetime_text);
  if (m1 === null || m2 === null) return false;
  const d1 = filmDuration(b1.film);
  const d2 = filmDuration(b2.film);
  return m1 < m2 + d2 + BUFFER_MIN && m2 < m1 + d1 + BUFFER_MIN;
}

function findConflicts(blocks) {
  const ids = new Set();
  for (let i = 0; i < blocks.length; i++)
    for (let j = i + 1; j < blocks.length; j++)
      if (blocksConflict(blocks[i], blocks[j])) {
        ids.add(blocks[i].screening.screening_id);
        ids.add(blocks[j].screening.screening_id);
      }
  return ids;
}

function optimize(selectedFilms) {
  const filmOptions = selectedFilms
    .map(film => ({
      film,
      options: film.screenings.filter(s => MY_DATES.has(extractDate(s.datetime_text))),
    }))
    .sort((a, b) => {
      if (!a.options.length && b.options.length) return 1;
      if (a.options.length && !b.options.length) return -1;
      return a.options.length - b.options.length;
    });

  const scheduled = [];
  const noOptions = [];
  const unfit     = [];

  for (const { film, options } of filmOptions) {
    if (!options.length) { noOptions.push(film); continue; }

    const scored = options.map(opt => {
      const conflictWith = scheduled.filter(s => blocksConflict({ film, screening: opt }, s)).map(s => s.film);
      return { opt, conflictWith };
    }).sort((a, b) => a.conflictWith.length - b.conflictWith.length);

    const best = scored[0];
    if (!best.conflictWith.length) {
      scheduled.push({ film, screening: best.opt });
    } else {
      unfit.push({ film, screening: best.opt, conflictsWith: best.conflictWith });
    }
  }

  return { scheduled, noOptions, unfit };
}

// ── timeline rendering ─────────────────────────────────────────────────────────
function assignLanes(blocks) {
  const laneEnds = [];
  blocks.forEach(block => {
    const start = minsFromMidnight(block.screening.datetime_text) ?? 0;
    const dur   = filmDuration(block.film);
    let placed = false;
    for (let i = 0; i < laneEnds.length; i++) {
      if (start >= laneEnds[i]) {
        block.lane = i;
        laneEnds[i] = start + dur;
        placed = true;
        break;
      }
    }
    if (!placed) {
      block.lane = laneEnds.length;
      laneEnds.push(start + dur);
    }
  });
  return Math.max(laneEnds.length, 1);
}

function buildTimeline(allBlocks, conflictIds) {
  const dayMap = {};
  PLAN_DAYS.forEach(d => { dayMap[d.key] = []; });

  allBlocks.forEach(b => {
    const dk = extractDate(b.screening.datetime_text);
    if (dayMap[dk]) dayMap[dk].push({ film: b.film, screening: b.screening, conflict: conflictIds.has(b.screening.screening_id) });
  });

  PLAN_DAYS.forEach(d => {
    dayMap[d.key].sort((a, b) =>
      (minsFromMidnight(a.screening.datetime_text) ?? 0) -
      (minsFromMidnight(b.screening.datetime_text) ?? 0));
  });

  // Axis labels and grid lines
  const axisLabels = [];
  const gridLines  = [];
  for (let h = TL_START_H; h <= TL_END_H; h++) {
    const top = (h * 60 - TL_START_H * 60) * PX_PER_MIN;
    gridLines.push(`<div class="tl-grid-line" style="top:${top}px"></div>`);
    if (h < TL_END_H)
      axisLabels.push(`<div class="tl-hour-label" style="top:${top}px">${h}:00</div>`);
  }

  const dayCols = PLAN_DAYS.map(day => {
    const blocks   = dayMap[day.key];
    const numLanes = assignLanes(blocks);

    const blocksHtml = blocks.map(({ film, screening, conflict, lane }) => {
      const startMin = minsFromMidnight(screening.datetime_text);
      if (startMin === null) return '';
      const dur    = filmDuration(film);
      const top    = (startMin - TL_START_H * 60) * PX_PER_MIN;
      const height = Math.max(dur * PX_PER_MIN, 44);
      const time   = screening.datetime_text.match(/, (.+)/)?.[1] ?? '';
      const endMin = startMin + dur;
      const endStr = `${Math.floor(endMin / 60)}:${String(endMin % 60).padStart(2, '0')}`;
      const laneW  = 100 / numLanes;

      return `<div class="film-block${conflict ? ' conflict' : ''}"
               data-slug="${film.slug}"
               style="top:${top}px;height:${height}px;left:calc(${lane*laneW}% + 3px);right:calc(${100-(lane+1)*laneW}% + 3px)">
        <button class="fb-remove" data-sid="${screening.screening_id}" title="Usuń seans">×</button>
        <div class="fb-time">${time} – ~${endStr}</div>
        <div class="fb-title">${film.title}</div>
        ${screening.venue_short ? `<div class="fb-venue">${screening.venue_short}</div>` : ''}
      </div>`;
    }).join('');

    return `<div class="tl-day-col">
      <div class="tl-day-hdr">
        <span class="tl-day-dn">${day.short}</span>
        <span class="tl-day-dt">${day.date}</span>
      </div>
      <div class="tl-day-body" style="height:${TL_RANGE_MIN * PX_PER_MIN}px">
        ${gridLines.join('')}
        ${blocksHtml}
      </div>
    </div>`;
  }).join('');

  return `<div class="tl-legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>seans w planie</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>konflikt czasowy</div>
    <div class="legend-item" style="color:var(--text-3);font-style:italic">najedź na blok → opis filmu, × usuwa seans</div>
  </div>
  <div class="tl-wrap">
    <div class="tl-flex">
      <div class="tl-axis-col">
        <div class="tl-day-hdr"></div>
        <div class="tl-axis-inner" style="height:${TL_RANGE_MIN * PX_PER_MIN}px">
          ${axisLabels.join('')}
        </div>
      </div>
      ${dayCols}
    </div>
  </div>`;
}

// ── plan view rendering ────────────────────────────────────────────────────────
function buildPlanListText(blocks) {
  const DAY_LABELS = {
    'pn 27 lip': 'Poniedziałek, 27 lip',
    'wt 28 lip': 'Wtorek, 28 lip',
    'śr 29 lip': 'Środa, 29 lip',
    'cz 30 lip': 'Czwartek, 30 lip',
  };
  const byDay = {};
  PLAN_DAYS.forEach(d => { byDay[d.key] = []; });
  blocks.forEach(b => {
    const dk = extractDate(b.screening.datetime_text);
    if (byDay[dk]) byDay[dk].push(b);
  });

  const lines = ['PLAN SEANSÓW — 27–30 LIP 2026', ''];
  PLAN_DAYS.forEach(d => {
    const day = byDay[d.key];
    if (!day.length) return;
    day.sort((a, b) => (minsFromMidnight(a.screening.datetime_text) ?? 0) - (minsFromMidnight(b.screening.datetime_text) ?? 0));
    lines.push(DAY_LABELS[d.key]);
    day.forEach(b => {
      const time = b.screening.datetime_text.match(/, (.+)/)?.[1] ?? '';
      const dur  = b.film.duration_minutes ? ` (${b.film.duration_minutes}')` : '';
      lines.push(`  • ${b.film.title} — ${time}, ${b.screening.venue}${dur}`);
    });
    lines.push('');
  });
  return lines.join('\n').trimEnd();
}

function renderPlanView() {
  const el = document.getElementById('plan-view');

  if (!wishlist.size) {
    el.innerHTML = `<div class="plan-empty">Dodaj filmy do planu, klikając ☆ przy filmie w programie.</div>`;
    return;
  }

  const selected = films.filter(f => wishlist.has(f.slug));

  // Collect all Jul 27-30 screenings, minus user-excluded ones
  const allBlocks = [];
  selected.forEach(film => {
    film.screenings
      .filter(s => MY_DATES.has(extractDate(s.datetime_text)) && !excludedScreenings.has(s.screening_id))
      .forEach(s => allBlocks.push({ film, screening: s }));
  });

  // Films entirely hidden (all screenings excluded or none in Jul 27-30)
  const hiddenFilms = selected.filter(film => {
    const stayScreenings = film.screenings.filter(s => MY_DATES.has(extractDate(s.datetime_text)));
    if (!stayScreenings.length) return true; // no screenings during stay
    return stayScreenings.every(s => excludedScreenings.has(s.screening_id));
  });

  const conflictIds = findConflicts(allBlocks);
  allBlocks.forEach(b => { b.conflict = conflictIds.has(b.screening.screening_id); });

  const nConflicts = conflictIds.size;

  const statsHtml = `<div class="plan-stats">
    <div class="pstat">
      <span class="pstat-n">${allBlocks.length}</span>
      <span class="pstat-l">seansów w planie</span>
    </div>
    ${nConflicts ? `<div class="pstat">
      <span class="pstat-n red">${nConflicts}</span>
      <span class="pstat-l">konfliktów</span>
    </div>` : ''}
    ${hiddenFilms.length ? `<div class="pstat">
      <span class="pstat-n grey">${hiddenFilms.length}</span>
      <span class="pstat-l">ukrytych</span>
    </div>` : ''}
  </div>
  <p class="plan-note">Najedź na seans i kliknij × żeby go usunąć${nConflicts ? ' · czerwony = konflikt czasowy' : ''}</p>`;

  // Issues: films with no visible screenings
  let issuesHtml = '';
  if (hiddenFilms.length) {
    const parts = [`<p class="plan-section-hdr">Brak seansu w planie (${hiddenFilms.length}) — wróć do programu żeby zmienić wybór</p>`];
    hiddenFilms.forEach(film => {
      const noStay = !film.screenings.some(s => MY_DATES.has(extractDate(s.datetime_text)));
      parts.push(`<div class="plan-issue">
        <strong>${film.title}</strong>
        <span class="issue-sub">${noStay ? 'Wszystkie seanse poza pobytem 27–30 lip' : 'Wszystkie seanse usunięte — odśwież stronę żeby przywrócić'}</span>
      </div>`);
    });
    issuesHtml = `<div class="plan-issues">${parts.join('')}</div>`;
  }

  // Bottom copyable list
  const listText = buildPlanListText(allBlocks);
  const listHtml = `<div class="plan-list">
    <div class="plan-list-head">
      <span class="plan-list-title">Lista do zakupu biletów</span>
      <button class="copy-btn" onclick="copyPlanList(this)">Kopiuj</button>
    </div>
    <textarea class="plan-list-text" id="plan-list-text" readonly spellcheck="false">${listText}</textarea>
  </div>`;

  el.innerHTML = `
    <div class="plan-top">${statsHtml}</div>
    ${buildTimeline(allBlocks, conflictIds)}
    ${issuesHtml}
    ${listHtml}
  `;
}

function copyPlanList(btn) {
  const ta = document.getElementById('plan-list-text');
  navigator.clipboard.writeText(ta.value).then(() => {
    btn.textContent = 'Skopiowano!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopiuj'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── palette per section (stable hash) ─────────────────────────────────────────
const PALETTES = [
  { bg:'rgba(236,0,140,.08)',  bd:'rgba(236,0,140,.3)',  tx:'#c4006e' },
  { bg:'rgba(30,120,200,.08)', bd:'rgba(30,120,200,.28)', tx:'#1a6ab0' },
  { bg:'rgba(120,60,180,.08)', bd:'rgba(120,60,180,.28)', tx:'#8040b8' },
  { bg:'rgba(20,140,80,.08)',  bd:'rgba(20,140,80,.28)',  tx:'#127840' },
  { bg:'rgba(200,60,40,.08)',  bd:'rgba(200,60,40,.28)',  tx:'#a83020' },
  { bg:'rgba(160,120,0,.08)',  bd:'rgba(160,120,0,.28)',  tx:'#8a6800' },
  { bg:'rgba(0,140,160,.08)',  bd:'rgba(0,140,160,.28)',  tx:'#007888' },
];

const pCache = {};
function pal(name) {
  if (!pCache[name]) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    pCache[name] = PALETTES[h % PALETTES.length];
  }
  return pCache[name];
}

// ── render helpers ─────────────────────────────────────────────────────────────
function badge(sec) {
  const p = pal(sec);
  return `<span class="badge" style="background:${p.bg};border-color:${p.bd};color:${p.tx}">${sec}</span>`;
}

function card(film, idx, animate) {
  const delay      = animate ? Math.min(idx * 20, 200) : 0;
  const hasDiff    = film.title_original && film.title_original !== film.title;
  const wishlisted = wishlist.has(film.slug);
  let sc = film.screenings || [];
  if (myStay)    sc = sc.filter(s => MY_DATES.has(extractDate(s.datetime_text)));
  if (activeDate) sc = sc.filter(s => extractDate(s.datetime_text) === activeDate);
  const desc = (film.description || '').replace(/\n+/g, ' ').trim();

  const badgesHtml = film.sections.map(badge).join('');
  const scHtml = sc.map(s =>
    `<span class="stag ${s.available ? 'ok' : ''}">
      <span class="sdot"></span>
      <span class="stime">${s.datetime_text}</span>
      ${s.venue_short ? `<span class="svenue">${s.venue_short}</span>` : ''}
    </span>`
  ).join('');

  return `
<article class="card" style="animation-delay:${delay}ms">
  <div class="card-main">
    ${badgesHtml ? `<div class="badges">${badgesHtml}</div>` : ''}
    <h2 class="title"><a href="${film.url}" target="_blank" rel="noopener">${film.title}</a></h2>
    ${hasDiff ? `<p class="orig">${film.title_original}</p>` : ''}
    ${film.director ? `<p class="dir">${film.director}${film.duration_minutes ? `<span class="dur">· ${film.duration_minutes}'</span>` : ''}</p>` : ''}
    ${desc ? `
    <div class="desc">
      <div class="desc-body">${desc}</div>
      <button class="more" onclick="toggle(this)">więcej ↓</button>
    </div>` : ''}
    ${film.prizes?.length ? `
    <div class="prizes">
      <span class="prize-count">${film.prizes.length} nagród${film.prizes.length === 1 ? 'a' : ''}</span>
      <ul class="prize-list">${film.prizes.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>` : ''}
  </div>
  <div class="card-sc">
    <button class="wl-btn${wishlisted ? ' on' : ''}"
            data-slug="${film.slug}"
            title="${wishlisted ? 'Usuń z planu' : 'Dodaj do planu'}"
            aria-label="${wishlisted ? 'Usuń z planu' : 'Dodaj do planu'}">${wishlisted ? '★' : '☆'}</button>
    ${scHtml}
  </div>
</article>`;
}

function extractDate(dtText) {
  const m = dtText.match(/^([^\s,]+ \d+ [^\s,]+)/);
  return m ? m[1] : '';
}

function dateSort(a, b) {
  const months = { lip: 7, sie: 8 };
  const ma = a.match(/(\d+) ([^\s,]+)$/);
  const mb = b.match(/(\d+) ([^\s,]+)$/);
  if (!ma || !mb) return 0;
  return (months[ma[2]] * 100 + parseInt(ma[1])) - (months[mb[2]] * 100 + parseInt(mb[1]));
}

function filtered() {
  const q = query.toLowerCase();
  return films.filter(f => {
    const txt = `${f.title} ${f.title_original || ''} ${f.director || ''}`.toLowerCase();
    if (q && !txt.includes(q)) return false;
    if (activeSection && !f.sections.includes(activeSection)) return false;
    if (availOnly && !f.screenings.some(s => s.available)) return false;
    if (myStay && !f.screenings.some(s => MY_DATES.has(extractDate(s.datetime_text)))) return false;
    if (activeDate && !f.screenings.some(s => extractDate(s.datetime_text) === activeDate)) return false;
    return true;
  });
}

function render() {
  const list = filtered();
  const grid = document.getElementById('grid');
  const cnt  = document.getElementById('count');

  cnt.textContent = (list.length < films.length)
    ? `${list.length} z ${films.length}`
    : `${films.length} filmów`;

  if (!list.length) {
    grid.innerHTML = '<div class="msg">Brak wyników dla podanych kryteriów</div>';
    return;
  }

  const animate = firstRender;
  firstRender = false;
  grid.innerHTML = list.map((f, i) => card(f, i, animate)).join('');

  requestAnimationFrame(() => {
    grid.querySelectorAll('.desc-body').forEach(el => {
      if (el.scrollHeight > el.offsetHeight + 2)
        el.nextElementSibling.style.display = 'inline-block';
    });
  });
}

function buildChips(sections, dates) {
  const el = document.getElementById('chips');
  const mk = (label, val) =>
    `<button class="chip${val === activeSection ? ' on' : ''}" data-v="${val}">${label}</button>`;
  el.innerHTML = mk('Wszystkie', '') + sections.map(s => mk(s, s)).join('');
  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeSection = chip.dataset.v;
      el.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c === chip));
      render();
    });
  });

  const stayBtn = document.getElementById('stay-btn');
  stayBtn.classList.toggle('stay-on', myStay);
  stayBtn.addEventListener('click', () => {
    myStay = !myStay;
    if (myStay) {
      activeDate = '';
      del.querySelectorAll('.chip').forEach(c => c.classList.remove('date-on'));
    } else {
      del.querySelector('[data-v=""]').classList.add('date-on');
    }
    stayBtn.classList.toggle('stay-on', myStay);
    render();
  });

  const del = document.getElementById('date-chips');
  const mkd = (label, val) =>
    `<button class="chip${!myStay && val === activeDate ? ' date-on' : ''}" data-v="${val}">${label}</button>`;
  del.innerHTML = mkd('Wszystkie', '') + dates.map(d => mkd(d, d)).join('');
  del.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      myStay = false;
      stayBtn.classList.remove('stay-on');
      activeDate = chip.dataset.v;
      del.querySelectorAll('.chip').forEach(c => c.classList.toggle('date-on', c === chip));
      render();
    });
  });

  document.getElementById('avail-btn').addEventListener('click', () => {
    availOnly = !availOnly;
    document.getElementById('avail-btn').classList.toggle('avail-on', availOnly);
    render();
  });
}

function updateStats() {
  const seats = films.reduce((n, f) => n + (f.screenings?.length || 0), 0);
  const avail = films.reduce((n, f) => n + (f.screenings?.filter(s => s.available).length || 0), 0);
  document.getElementById('s-films').textContent = films.length;
  document.getElementById('s-seats').textContent = seats;
  document.getElementById('s-avail').textContent = avail;
}

function toggle(btn) {
  const body = btn.previousElementSibling;
  const open = body.classList.toggle('open');
  btn.textContent = open ? 'zwiń ↑' : 'więcej ↓';
}

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

async function init() {
  try {
    const res = await fetch('./films.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    films = await res.json();
    films.sort((a, b) => (b.prizes?.length || 0) - (a.prizes?.length || 0));
    updateStats();
    updatePlanBadge();
    const sections = [...new Set(films.flatMap(f => f.sections))];
    const dates = [...new Set(films.flatMap(f => f.screenings.map(s => extractDate(s.datetime_text)).filter(Boolean)))].sort(dateSort);
    buildChips(sections, dates);
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="msg">Błąd ładowania: ${e.message}</div>`;
  }
}

init();
</script>
</body>
