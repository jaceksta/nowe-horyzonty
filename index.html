<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nowe Horyzonty 2026 — Program Filmowy</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #eeeeee;
      --surface:    #ffffff;
      --surface-h:  #f5f5f5;
      --seam:       #cccccc;
      --text-1:     #121212;
      --text-2:     #555555;
      --text-3:     #999999;
      --accent:     #EC008C;
      --green:      rgba(25,135,84,.09);
      --green-text: #1a7a40;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Roboto', Arial, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── header ── */
    header {
      background: var(--surface);
      padding: 52px 48px 40px;
      border-bottom: 2px solid var(--text-1);
      position: relative;
      overflow: hidden;
    }

    .ghost {
      position: absolute; right: -16px; bottom: -50px;
      font-family: 'Roboto', sans-serif;
      font-size: 260px; font-weight: 700; line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px #e2e2e2;
      pointer-events: none; user-select: none;
    }

    .eyebrow {
      font-size: 10px; letter-spacing: .3em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px; font-weight: 400;
    }

    h1 {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(38px, 5vw, 72px);
      font-weight: 400; line-height: 1.05;
      letter-spacing: -.02em;
    }

    h1 em { font-style: normal; color: var(--accent); }

    .sub {
      margin-top: 10px; font-size: 11.5px;
      color: var(--text-3); letter-spacing: .12em;
      text-transform: uppercase;
    }

    .rule {
      width: 40px; height: 2px;
      background: var(--text-1);
      margin: 24px 0;
    }

    .stats { display: flex; gap: 40px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-n {
      font-size: 34px; font-weight: 500;
      color: var(--accent); line-height: 1;
    }
    .stat-l {
      font-size: 9.5px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--text-3);
    }

    /* ── controls ── */
    .controls {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--seam);
      padding: 12px 48px;
      display: flex; flex-direction: column; gap: 9px;
    }

    .search-row { display: flex; align-items: center; gap: 10px; }

    .search-wrap { position: relative; flex: 1; max-width: 440px; }

    .search-wrap svg {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 13px; height: 13px; color: var(--text-3);
    }

    #search {
      width: 100%;
      background: #fff;
      border: 1px solid var(--seam);
      color: var(--text-1);
      padding: 8px 12px 8px 34px;
      font-family: 'Roboto', sans-serif;
      font-size: 13px; font-weight: 300;
      border-radius: 2em; outline: none;
      transition: border-color .15s;
    }
    #search::placeholder { color: var(--text-3); }
    #search:focus { border-color: var(--accent); }

    .count {
      font-size: 11.5px; color: var(--text-3);
      letter-spacing: .03em; white-space: nowrap;
      min-width: 58px; text-align: right;
    }

    /* filter rows */
    .filter-rows { display: flex; flex-direction: column; gap: 7px; }
    .filter-row { display: flex; align-items: center; gap: 7px; }
    .filter-label {
      font-size: 9px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--text-3);
      flex-shrink: 0; min-width: 40px;
    }

    .chips { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 4px 13px;
      font-size: 11px; font-family: 'Roboto', sans-serif;
      font-weight: 400; letter-spacing: .04em;
      border: 1px solid var(--seam); border-radius: 2em;
      background: #fff; color: var(--text-3);
      cursor: pointer; white-space: nowrap;
      transition: border-color .15s, color .15s, background .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text-2); }

    .chip.on {
      background: var(--text-1); border-color: var(--text-1);
      color: #fff; font-weight: 500;
    }
    .chip.date-on {
      background: var(--text-1); border-color: var(--text-1);
      color: #fff; font-weight: 500;
    }
    .chip.stay-on {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 500;
    }
    .chip.avail-on {
      background: rgba(25,135,84,.12); border-color: rgba(25,135,84,.5);
      color: var(--green-text); font-weight: 500;
    }

    /* ── list ── */
    .grid {
      display: flex; flex-direction: column;
      gap: 1px; background: var(--seam);
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      padding: 16px 30px;
      position: relative; overflow: hidden;
      display: flex; gap: 24px; align-items: flex-start;
      transition: background .15s;
    }

    .card::before {
      content: ''; position: absolute;
      top: 0; left: 0; width: 3px; height: 0;
      background: var(--accent);
      transition: height .25s ease;
    }
    .card:hover { background: var(--surface-h); }
    .card:hover::before { height: 100%; }

    .card-main { flex: 1; min-width: 0; }

    .card-sc {
      flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
      padding-top: 1px; min-width: 148px;
    }

    /* badges */
    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }

    .badge {
      font-size: 9px; letter-spacing: .13em;
      text-transform: uppercase;
      padding: 2px 8px; border-radius: 2em;
      border: 1px solid transparent;
    }

    /* title */
    .title {
      font-family: 'Roboto', sans-serif;
      font-size: 19px; font-weight: 500; line-height: 1.2;
      margin-bottom: 2px;
    }
    .title a { color: inherit; text-decoration: none; transition: color .15s; }
    .title a:hover { color: var(--accent); }

    .orig {
      font-size: 12.5px; font-style: italic;
      color: var(--text-3); margin-bottom: 4px;
    }

    .dir {
      font-size: 11.5px; color: var(--text-3);
      margin-bottom: 9px; font-weight: 400;
    }
    .dir::before {
      content: 'reż. ';
      font-size: 9.5px; letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* screening tags */
    .stag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; font-size: 10.5px;
      border: 1px solid var(--seam); border-radius: 2px;
      background: #fff;
    }
    .stag.ok {
      border-color: rgba(25,135,84,.35);
      background: var(--green);
    }

    .sdot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-3); flex-shrink: 0;
    }
    .stag.ok .sdot { background: var(--green-text); }

    .stime { color: var(--text-2); }
    .stag.ok .stime { color: var(--green-text); }

    .svenue {
      font-size: 9px; color: var(--text-3);
      padding-left: 5px; border-left: 1px solid var(--seam);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .stag.ok .svenue { color: var(--green-text); opacity: .7; border-color: rgba(25,135,84,.3); }

    /* description */
    .desc { font-size: 12.5px; line-height: 1.75; color: var(--text-2); }

    .desc-body {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }
    .desc-body.open { display: block; }

    .more {
      display: none;
      margin-top: 6px;
      font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--accent);
      cursor: pointer; background: none; border: none;
      padding: 0; font-family: inherit;
      transition: opacity .15s;
    }
    .more:hover { opacity: .6; }

    /* prizes */
    .prizes { margin-top: 10px; }

    .prize-count {
      display: inline-block;
      font-size: 9.5px; letter-spacing: .14em;
      text-transform: uppercase; font-weight: 500;
      color: var(--accent); margin-bottom: 4px;
    }

    .prize-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 2px;
    }

    .prize-list li {
      font-size: 11.5px; color: var(--text-3);
      padding-left: 10px; position: relative;
    }

    .prize-list li::before {
      content: '—';
      position: absolute; left: 0;
      color: var(--accent); font-size: 10px;
    }

    /* empty */
    .msg {
      padding: 100px 40px; text-align: center;
      color: var(--text-3); font-size: 20px; font-weight: 300;
      background: var(--surface);
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: up .28s ease both; }

    /* footer */
    footer {
      background: var(--surface);
      padding: 24px 48px;
      border-top: 2px solid var(--text-1);
      font-size: 10px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text-3);
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }

    /* responsive */
    @media (max-width: 768px) {
      header { padding: 32px 20px 28px; }
      .ghost { font-size: 140px; right: -10px; bottom: -20px; }
      .controls { padding: 10px 20px; }
      .card { padding: 14px 20px; flex-direction: column; gap: 10px; }
      .card-sc { align-items: flex-start; min-width: 0; flex-direction: row; flex-wrap: wrap; }
      footer { padding: 20px 20px; }
      .stats { gap: 22px; }
    }
    @media (max-width: 460px) {
      h1 { font-size: 34px; }
      .ghost { display: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="ghost" aria-hidden="true">NH</p>
  <p class="eyebrow">26. Międzynarodowy Festiwal Filmowy</p>
  <h1>Nowe <em>Horyzonty</em></h1>
  <p class="sub">Wrocław &nbsp;·&nbsp; 23 lip – 2 sie 2026</p>
  <div class="rule"></div>
  <div class="stats">
    <div class="stat">
      <span class="stat-n" id="s-films">–</span>
      <span class="stat-l">Filmów</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="s-seats">–</span>
      <span class="stat-l">Seansów</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="s-avail">–</span>
      <span class="stat-l">Dostępnych</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7.5"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21"/>
      </svg>
      <input type="text" id="search" placeholder="Szukaj tytułu lub reżysera…" autocomplete="off" spellcheck="false">
    </div>
    <button class="chip" id="avail-btn">Tylko dostępne</button>
    <span class="count" id="count"></span>
  </div>
  <div class="filter-rows">
    <div class="filter-row">
      <span class="filter-label">Sekcja</span>
      <div class="chips" id="chips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Dzień</span>
      <button class="chip" id="stay-btn">Mój pobyt 27–30 lip</button>
      <div class="chips" id="date-chips"></div>
    </div>
  </div>
</div>

<main>
  <div class="grid" id="grid">
    <div class="msg">Ładowanie programu…</div>
  </div>
</main>

<footer>
  <span>Nowe Horyzonty 2026</span>
  <span>nowehoryzonty.pl</span>
</footer>

<script>
let films = [];
let query = '';
let activeSection = '';
let availOnly = false;
let activeDate = '';
let myStay = false;
let firstRender = true;

const MY_DATES = new Set(['pn 27 lip', 'wt 28 lip', 'śr 29 lip', 'cz 30 lip']);

// ── palette per section (stable hash) ─────────────────────────────────────────
const PALETTES = [
  { bg:'rgba(236,0,140,.08)',  bd:'rgba(236,0,140,.3)',  tx:'#c4006e' },
  { bg:'rgba(30,120,200,.08)', bd:'rgba(30,120,200,.28)', tx:'#1a6ab0' },
  { bg:'rgba(120,60,180,.08)', bd:'rgba(120,60,180,.28)', tx:'#8040b8' },
  { bg:'rgba(20,140,80,.08)',  bd:'rgba(20,140,80,.28)',  tx:'#127840' },
  { bg:'rgba(200,60,40,.08)',  bd:'rgba(200,60,40,.28)',  tx:'#a83020' },
  { bg:'rgba(160,120,0,.08)',  bd:'rgba(160,120,0,.28)',  tx:'#8a6800' },
  { bg:'rgba(0,140,160,.08)',  bd:'rgba(0,140,160,.28)',  tx:'#007888' },
];

const pCache = {};
function pal(name) {
  if (!pCache[name]) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    pCache[name] = PALETTES[h % PALETTES.length];
  }
  return pCache[name];
}

// ── render helpers ─────────────────────────────────────────────────────────────
function badge(sec) {
  const p = pal(sec);
  return `<span class="badge" style="background:${p.bg};border-color:${p.bd};color:${p.tx}">${sec}</span>`;
}

function card(film, idx, animate) {
  const delay = animate ? Math.min(idx * 20, 200) : 0;
  const hasDiff = film.title_original && film.title_original !== film.title;
  let sc = film.screenings || [];
  if (myStay) sc = sc.filter(s => MY_DATES.has(extractDate(s.datetime_text)));
  if (activeDate) sc = sc.filter(s => extractDate(s.datetime_text) === activeDate);
  const desc = (film.description || '').replace(/\n+/g, ' ').trim();

  const badgesHtml = film.sections.map(badge).join('');
  const scHtml = sc.map(s =>
    `<span class="stag ${s.available ? 'ok' : ''}">
      <span class="sdot"></span>
      <span class="stime">${s.datetime_text}</span>
      ${s.venue_short ? `<span class="svenue">${s.venue_short}</span>` : ''}
    </span>`
  ).join('');

  return `
<article class="card" style="animation-delay:${delay}ms">
  <div class="card-main">
    ${badgesHtml ? `<div class="badges">${badgesHtml}</div>` : ''}
    <h2 class="title"><a href="${film.url}" target="_blank" rel="noopener">${film.title}</a></h2>
    ${hasDiff ? `<p class="orig">${film.title_original}</p>` : ''}
    ${film.director ? `<p class="dir">${film.director}</p>` : ''}
    ${desc ? `
    <div class="desc">
      <div class="desc-body">${desc}</div>
      <button class="more" onclick="toggle(this)">więcej ↓</button>
    </div>` : ''}
    ${film.prizes?.length ? `
    <div class="prizes">
      <span class="prize-count">${film.prizes.length} nagród${film.prizes.length === 1 ? 'a' : ''}</span>
      <ul class="prize-list">${film.prizes.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>` : ''}
  </div>
  ${scHtml ? `<div class="card-sc">${scHtml}</div>` : ''}
</article>`;
}

function extractDate(dtText) {
  const m = dtText.match(/^([^\s,]+ \d+ [^\s,]+)/);
  return m ? m[1] : '';
}

function dateSort(a, b) {
  const months = { lip: 7, sie: 8 };
  const ma = a.match(/(\d+) ([^\s,]+)$/);
  const mb = b.match(/(\d+) ([^\s,]+)$/);
  if (!ma || !mb) return 0;
  return (months[ma[2]] * 100 + parseInt(ma[1])) - (months[mb[2]] * 100 + parseInt(mb[1]));
}

function filtered() {
  const q = query.toLowerCase();
  return films.filter(f => {
    const txt = `${f.title} ${f.title_original || ''} ${f.director || ''}`.toLowerCase();
    if (q && !txt.includes(q)) return false;
    if (activeSection && !f.sections.includes(activeSection)) return false;
    if (availOnly && !f.screenings.some(s => s.available)) return false;
    if (myStay && !f.screenings.some(s => MY_DATES.has(extractDate(s.datetime_text)))) return false;
    if (activeDate && !f.screenings.some(s => extractDate(s.datetime_text) === activeDate)) return false;
    return true;
  });
}

function render() {
  const list = filtered();
  const grid = document.getElementById('grid');
  const cnt  = document.getElementById('count');

  cnt.textContent = (list.length < films.length)
    ? `${list.length} z ${films.length}`
    : `${films.length} filmów`;

  if (!list.length) {
    grid.innerHTML = '<div class="msg">Brak wyników dla podanych kryteriów</div>';
    return;
  }

  const animate = firstRender;
  firstRender = false;
  grid.innerHTML = list.map((f, i) => card(f, i, animate)).join('');

  requestAnimationFrame(() => {
    grid.querySelectorAll('.desc-body').forEach(el => {
      if (el.scrollHeight > el.offsetHeight + 2) {
        el.nextElementSibling.style.display = 'inline-block';
      }
    });
  });
}

function buildChips(sections, dates) {
  // Section chips
  const el = document.getElementById('chips');
  const mk = (label, val) =>
    `<button class="chip${val === activeSection ? ' on' : ''}" data-v="${val}">${label}</button>`;
  el.innerHTML = mk('Wszystkie', '') + sections.map(s => mk(s, s)).join('');
  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeSection = chip.dataset.v;
      el.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c === chip));
      render();
    });
  });

  // Stay button
  const stayBtn = document.getElementById('stay-btn');
  stayBtn.addEventListener('click', () => {
    myStay = !myStay;
    if (myStay) {
      activeDate = '';
      del.querySelectorAll('.chip').forEach(c => c.classList.remove('date-on'));
    } else {
      del.querySelector('[data-v=""]').classList.add('date-on');
    }
    stayBtn.classList.toggle('stay-on', myStay);
    render();
  });

  // Date chips
  const del = document.getElementById('date-chips');
  const mkd = (label, val) =>
    `<button class="chip${!myStay && val === activeDate ? ' date-on' : ''}" data-v="${val}">${label}</button>`;
  del.innerHTML = mkd('Wszystkie', '') + dates.map(d => mkd(d, d)).join('');
  del.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      myStay = false;
      stayBtn.classList.remove('stay-on');
      activeDate = chip.dataset.v;
      del.querySelectorAll('.chip').forEach(c => c.classList.toggle('date-on', c === chip));
      render();
    });
  });

  // Available toggle
  document.getElementById('avail-btn').addEventListener('click', () => {
    availOnly = !availOnly;
    document.getElementById('avail-btn').classList.toggle('avail-on', availOnly);
    render();
  });
}

function updateStats() {
  const seats = films.reduce((n, f) => n + (f.screenings?.length || 0), 0);
  const avail = films.reduce((n, f) => n + (f.screenings?.filter(s => s.available).length || 0), 0);
  document.getElementById('s-films').textContent = films.length;
  document.getElementById('s-seats').textContent = seats;
  document.getElementById('s-avail').textContent = avail;
}

function toggle(btn) {
  const body = btn.previousElementSibling;
  const open = body.classList.toggle('open');
  btn.textContent = open ? 'zwiń ↑' : 'więcej ↓';
}

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

async function init() {
  try {
    const res = await fetch('./films.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    films = await res.json();
    films.sort((a, b) => (b.prizes?.length || 0) - (a.prizes?.length || 0));
    updateStats();
    const sections = [...new Set(films.flatMap(f => f.sections))];
    const dates = [...new Set(films.flatMap(f => f.screenings.map(s => extractDate(s.datetime_text)).filter(Boolean)))].sort(dateSort);
    buildChips(sections, dates);
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="msg">Błąd ładowania: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
